<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coach Closing Properti — Premium Strategist</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg2: #141414;
            --bg3: #1d1d1d;
            --bd: rgba(255, 255, 255, 0.08);
            --bd2: rgba(255, 255, 255, 0.12);
            --tx: #f0f0f0;
            --tx2: #a0a0a0;
            --tx3: #666666;
            --gold: #d4af37;
            --gol2: #f4cf6d;
            --gbg: rgba(212, 175, 55, 0.05);
            --gbd: rgba(212, 175, 55, 0.2);
            --grn: #4ade80;
            --red: #f87171;
            --r: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--tx);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Topbar */
        .topbar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid var(--bd);
            background: var(--bg);
            z-index: 10;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo {
            width: 32px;
            height: 32px;
            background: var(--gbg);
            border: 1px solid var(--gbd);
            border-radius: 8px;
            display: grid;
            place-items: center;
        }
        .logo svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 2; }
        .brand b { display: block; font-size: 14px; font-weight: 600; color: var(--tx); }
        .brand span { font-size: 11px; color: var(--tx3); font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 1px; }

        /* Main Layout */
        .main { flex: 1; display: grid; grid-template-columns: 320px 1fr; min-height: 0; }

        /* Sidebar */
        .sidebar {
            background: var(--bg);
            border-right: 1px solid var(--bd);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--tx3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid var(--bd);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 11px; color: var(--tx2); margin-bottom: 6px; font-weight: 500; }
        
        select, textarea, input {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--bd2);
            color: var(--tx);
            border-radius: var(--r);
            padding: 10px 12px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--bg3);
            box-shadow: 0 0 0 2px var(--gbg);
        }

        .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .chip {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 100px;
            border: 1px solid var(--bd2);
            background: transparent;
            color: var(--tx2);
            cursor: pointer;
            transition: 0.2s;
        }
        .chip:hover { border-color: var(--gold); color: var(--gold); background: var(--gbg); }

        .btn-generate {
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: var(--r);
            padding: 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-generate:hover { background: var(--gol2); transform: translateY(-1px); }
        .btn-generate:active { transform: translateY(0); }
        .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        /* Output Column */
        .output-container { display: flex; flex-direction: column; min-height: 0; background: #0c0c0c; }
        
        .tabs {
            display: flex;
            padding: 0 24px;
            border-bottom: 1px solid var(--bd);
            gap: 4px;
            overflow-x: auto;
            background: var(--bg);
        }
        .tab {
            padding: 16px 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--tx3);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab:hover { color: var(--tx2); }
        .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--tx3);
        }
        .status-dot.loading { background: var(--gold); animation: pulse 1s infinite; }
        .status-dot.success { background: var(--grn); }

        .content-area { flex: 1; overflow-y: auto; padding: 40px; }
        .panel { display: none; max-width: 800px; margin: 0 auto; }
        .panel.active { display: block; }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0.5;
        }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; stroke: var(--tx3); }

        /* Markdown Styles */
        .md h2 { color: var(--gold); font-size: 20px; margin-bottom: 16px; border-bottom: 1px solid var(--bd); padding-bottom: 8px; }
        .md h3 { color: var(--tx); font-size: 15px; margin: 20px 0 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .md p { margin-bottom: 12px; color: var(--tx2); }
        .md ul, .md ol { margin-bottom: 16px; padding-left: 20px; }
        .md li { margin-bottom: 8px; color: var(--tx2); }
        .md blockquote {
            background: var(--bg2);
            border-left: 3px solid var(--gold);
            padding: 16px 20px;
            margin: 16px 0;
            border-radius: 0 var(--r) var(--r) 0;
        }
        .md blockquote strong { color: var(--gold); }
        .md blockquote p { margin-bottom: 0; color: var(--tx); font-style: italic; }

        /* Skeleton */
        .skeleton { display: none; flex-direction: column; gap: 12px; }
        .skeleton.active { display: flex; }
        .sk-line { height: 14px; background: var(--bg2); border-radius: 4px; animation: shine 1.5s infinite linear; }

        @keyframes shine {
            0% { opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { opacity: 0.3; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Notification */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--bg3);
            border: 1px solid var(--bd2);
            border-radius: var(--r);
            font-size: 12px;
            color: var(--tx);
            transform: translateY(100px);
            transition: 0.3s;
            z-index: 100;
        }
        #toast.show { transform: translateY(0); }

        @media (max-width: 850px) {
            .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
            .sidebar { border-right: none; border-bottom: 1px solid var(--bd); max-height: 350px; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="logo-area">
        <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <div class="brand">
            <b>CLOSING COACH PROPERTI</b>
            <span>AI Strategist for Real Estate</span>
        </div>
    </div>
    <div id="global-status" style="font-size: 11px; color: var(--tx3);">System Ready</div>
</header>

<div class="main">
    <aside class="sidebar">
        <section>
            <div class="section-label">Profil Prospek</div>
            <div class="field">
                <label>Tipe Prospek</label>
                <select id="tipe">
                    <option value="Pembeli rumah pertama">First-Time Home Buyer</option>
                    <option value="Investor properti">Investor</option>
                    <option value="Pasangan muda">Pasangan Muda</option>
                    <option value="Keluarga mapan">Keluarga Mapan</option>
                    <option value="Karyawan / Pegawai">Karyawan</option>
                    <option value="Pengusaha">Pengusaha</option>
                </select>
            </div>
            <div class="field">
                <label>Karakter Buyer</label>
                <select id="karakter">
                    <option value="Ragu-ragu / banyak mikir">Skeptis / Pikir-pikir</option>
                    <option value="Suka banding-bandingkan">Pembanding (Komparatif)</option>
                    <option value="Takut ambil keputusan">Takut Salah Langkah</option>
                    <option value="Sudah survey belum booking">Hot Lead (Tunda Booking)</option>
                    <option value="Langsung to the point">To The Point / Dominan</option>
                </select>
            </div>
        </section>

        <section>
            <div class="section-label">Target & Konteks</div>
            <div class="field">
                <label>Target Action</label>
                <select id="target">
                    <option value="Booking Fee / Tanda Jadi">Closing Booking Fee</option>
                    <option value="Jadwal Survey / Site Visit">Jadwal Survey</option>
                    <option value="Pilih Unit Spesifik">Lock Unit</option>
                    <option value="Proses KPR">Submit Berkas KPR</option>
                </select>
            </div>
            <div class="field">
                <label>Objeksi Utama</label>
                <div class="chips">
                    <span class="chip" onclick="addObjeksi('Harga kemahalan')">Harga Mahal</span>
                    <span class="chip" onclick="addObjeksi('Tanya pasangan dulu')">Tanya Pasangan</span>
                    <span class="chip" onclick="addObjeksi('Lokasi jauh')">Lokasi Jauh</span>
                    <span class="chip" onclick="addObjeksi('Bunga KPR tinggi')">KPR Sulit</span>
                </div>
                <textarea id="objeksi" style="margin-top: 10px;" placeholder="Tulis keluhan atau situasi spesifik prospek..."></textarea>
            </div>
            <div class="field">
                <label>Nama Produk (Opsional)</label>
                <input type="text" id="produk" placeholder="Contoh: Green Residence Unit Hook">
            </div>
        </section>

        <button class="btn-generate" id="btn-run" onclick="generateStrategy()">
            <svg style="width:16px;height:16px;fill:currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>
            BUAT STRATEGI
        </button>
    </aside>

    <div class="output-container">
        <nav class="tabs">
            <button class="tab active" onclick="switchTab(0)"><div class="status-dot" id="dot-0"></div>Analisis</button>
            <button class="tab" onclick="switchTab(1)"><div class="status-dot" id="dot-1"></div>Script</button>
            <button class="tab" onclick="switchTab(2)"><div class="status-dot" id="dot-2"></div>Handling</button>
            <button class="tab" onclick="switchTab(3)"><div class="status-dot" id="dot-3"></div>Follow Up</button>
            <button class="tab" onclick="switchTab(4)"><div class="status-dot" id="dot-4"></div>Closing</button>
        </nav>

        <div class="content-area">
            <div id="empty-state" class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 8V12M12 16H12.01M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <p>Belum ada data strategi.<br><small style="color:var(--tx3)">Silakan isi data di kiri dan klik "Buat Strategi"</small></p>
            </div>

            <!-- Tab Panels -->
            <div id="panel-0" class="panel md">
                <div class="skeleton" id="skel-0"><div class="sk-line" style="width:60%"></div><div class="sk-line"></div><div class="sk-line" style="width:80%"></div><div class="sk-line" style="width:40%"></div></div>
                <div id="out-0"></div>
            </div>
            <div id="panel-1" class="panel md">
                <div class="skeleton" id="skel-1"><div class="sk-line" style="width:50%"></div><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line" style="width:70%"></div></div>
                <div id="out-1"></div>
            </div>
            <div id="panel-2" class="panel md">
                <div class="skeleton" id="skel-2"><div class="sk-line" style="width:40%"></div><div class="sk-line" style="width:90%"></div><div class="sk-line"></div></div>
                <div id="out-2"></div>
            </div>
            <div id="panel-3" class="panel md">
                <div class="skeleton" id="skel-3"><div class="sk-line"></div><div class="sk-line" style="width:85%"></div><div class="sk-line" style="width:60%"></div></div>
                <div id="out-3"></div>
            </div>
            <div id="panel-4" class="panel md">
                <div class="skeleton" id="skel-4"><div class="sk-line" style="width:70%"></div><div class="sk-line"></div><div class="sk-line" style="width:30%"></div></div>
                <div id="out-4"></div>
            </div>
        </div>
    </div>
</div>

<div id="toast">Notifikasi sistem</div>

<script>
    const apiKey = "server"; // Diset oleh environment
    let activeTab = 0;

    // Markdown configuration
    marked.setOptions({
        breaks: true,
        gfm: true
    });

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function addObjeksi(text) {
        const area = document.getElementById('objeksi');
        area.value = area.value ? area.value + ", " + text : text;
    }

    function switchTab(idx) {
        activeTab = idx;
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === idx));
    }

    async function fetchWithRetry(prompt, systemPrompt, retries = 5) {
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch('/api/gemini', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: {
            parts: [{ text: systemPrompt }]
        }
    })
});

                if (!response.ok) throw new Error('API Error');
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || "Gagal mendapatkan respons.";
            } catch (err) {
                if (i === retries - 1) throw err;
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
        }
    }

    async function generateStrategy() {
        const data = {
            tipe: document.getElementById('tipe').value,
            karakter: document.getElementById('karakter').value,
            target: document.getElementById('target').value,
            objeksi: document.getElementById('objeksi').value,
            produk: document.getElementById('produk').value || "Properti Umum"
        };

        const btn = document.getElementById('btn-run');
        btn.disabled = true;
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('global-status').textContent = "Thinking...";

        const systemPrompt = `Kamu adalah AI Coach Properti Senior di Indonesia dengan pengalaman closing ribuan unit.
        Tugasmu adalah memberikan strategi taktis untuk agen properti.
        ATURAN:
        1. Gunakan Bahasa Indonesia yang natural, tajam, dan persuasif.
        2. Format output harus Markdown murni.
        3. Gunakan blockquote untuk dialog (> **Agen:** ...)
        4. Berikan saran yang Actionable, bukan teori umum.
        
        Konteks Prospek saat ini:
        - Tipe: ${data.tipe}
        - Karakter: ${data.karakter}
        - Target: ${data.target}
        - Masalah/Objeksi: ${data.objeksi}
        - Produk: ${data.produk}`;

        const tasks = [
            { id: 0, label: "Analisis Psikologi", prompt: "Berikan analisis psikologi prospek ini. Mengapa dia ragu? Apa motivasi tersembunyinya? Berikan 3 poin strategi utama." },
            { id: 1, label: "Script Chat/Call", prompt: "Buat script percakapan WhatsApp/Telepon yang natural dari pembukaan sampai mengarahkan ke ${data.target}. Gunakan teknik 'Pattern Interrupt'." },
            { id: 2, label: "Handling Objeksi", prompt: "Bagaimana cara menjawab objeksi '${data.objeksi}'? Gunakan metode Feel-Felt-Found atau AQPC. Berikan minimal 2 variasi jawaban." },
            { id: 3, label: "Follow Up Plan", prompt: "Buat rencana follow up 7 hari (H+1, H+3, H+7). Apa isi pesannya? Jangan membosankan/spamming." },
            { id: 4, label: "Closing Statement", prompt: "Berikan 5 variasi kalimat closing mulai dari yang Soft (halus) sampai Hard (tegas/mendesak) khusus untuk target: ${data.target}." }
        ];

        // Reset outputs
        tasks.forEach(task => {
            document.getElementById(`out-${task.id}`).innerHTML = "";
            document.getElementById(`dot-${task.id}`).className = "status-dot loading";
            document.getElementById(`skel-${task.id}`).classList.add('active');
            document.getElementById(`panel-${task.id}`).classList.add('active');
        });
        switchTab(0);

        for (const task of tasks) {
            try {
                document.getElementById('global-status').textContent = `Menyusun ${task.label}...`;
                const text = await fetchWithRetry(task.prompt, systemPrompt);
                
                document.getElementById(`skel-${task.id}`).classList.remove('active');
                document.getElementById(`out-${task.id}`).innerHTML = marked.parse(text);
                document.getElementById(`dot-${task.id}`).className = "status-dot success";
            } catch (err) {
                document.getElementById(`skel-${task.id}`).classList.remove('active');
                document.getElementById(`out-${task.id}`).innerHTML = `<p style="color:var(--red)">Terjadi kesalahan koneksi. Silakan coba klik tombol Buat Strategi lagi.</p>`;
                document.getElementById(`dot-${task.id}`).className = "status-dot";
            }
        }

        document.getElementById('global-status').textContent = "Strategy Generated";
        btn.disabled = false;
        showToast("Strategi berhasil disusun!");
    }
</script>

</body>
</html>
